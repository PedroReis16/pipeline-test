name: Homolog Deploy

run-name: "${{ inputs.api_selection }} - Build: Homolog"

on:
  workflow_dispatch:
    inputs:
      api_selection:
        description: "Selecione a API"
        required: true
        type: choice
        options:
          - Primeira API
          - Segunda API

jobs:
  validate_environment:
    name: Environment Validation
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      dotnet_project: ${{ steps.deployment_vars.outputs.dotnet_project }}
      service_name: ${{ steps.deployment_vars.outputs.service_name }}
      dockerfile_path: ${{ steps.deployment_vars.outputs.dockerfile_path }}
      image_name: ${{ steps.deployment_vars.outputs.image_name }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate deployments details
        run: |
          if [[ ${{ github.ref_name }} != "develop" ]]; then
            echo "Esse workflow deve ser executado apenas na branch develop"
            exit 1
          fi

      - name: Setup Deployment Variables
        id: deployment_vars
        shell: bash
        run: |
          SLUG="${{ inputs.api_selection }}"


          #Mapeamento: slug | ProjectName | ContainerName
          case $SLUG in
            "Primeira API")     PROJ="PrimeiraAPI";     SVC="primeira-api" ;;
            "Segunda API")     PROJ="SegundaAPI";     SVC="segunda-api" ;;
          esac

          DOTNET_PROJECT="Pipeline.$PROJ"
          DOCKERFILE_PATH="./docker-compose/dockerfiles/$SVC.dockerfile"
          IMAGE_NAME="pipeline/$SVC-api"
          SERVICE_NAME="$SVC"

          echo "DOTNET_PROJECT=$DOTNET_PROJECT" >> "$GITHUB_ENV"
          echo "DOCKERFILE_PATH=$DOCKERFILE_PATH" >> "$GITHUB_ENV"
          echo "IMAGE_NAME=$IMAGE_NAME" >> "$GITHUB_ENV"
          echo "SERVICE_NAME=$SERVICE_NAME" >> "$GITHUB_ENV"

          echo "dotnet_project=$DOTNET_PROJECT" >> "$GITHUB_OUTPUT"
          echo "dockerfile_path=$DOCKERFILE_PATH" >> "$GITHUB_OUTPUT"
          echo "image_name=$IMAGE_NAME" >> "$GITHUB_OUTPUT"
          echo "service_name=$SERVICE_NAME" >> "$GITHUB_OUTPUT"

      - name: Remove existing homolog tag if present
        shell: bash
        run: |
          HOMOLOG_TAG="${{ steps.deployment_vars.outputs.service_name }}@homolog"
          echo "Verificando se a tag '$HOMOLOG_TAG' já existe no repositório..."
          git fetch --tags --force
          if git rev-parse "$HOMOLOG_TAG" >/dev/null 2>&1; then
            echo "Removendo tag existente: $HOMOLOG_TAG"
            git push origin ":refs/tags/$HOMOLOG_TAG"
            echo "Tag removida com sucesso."
          else
            echo "Tag '$HOMOLOG_TAG' não encontrada. Nenhuma ação necessária."
          fi


  project_build:
    name: Project compilation and tests
    needs: validate_environment
    runs-on: ubuntu-latest
    env:
      DOTNET_PROJECT: ${{ needs.validate_environment.outputs.dotnet_project }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Restore
        shell: bash
        run: |
          dotnet restore

      - name: Build project
        shell: bash
        run: |
          dotnet build "./${DOTNET_PROJECT}/${DOTNET_PROJECT}.csproj" -c Release --no-restore

      - name: Unit Tests
        shell: bash
        run: |
          dotnet test "./Tests/Unit/${DOTNET_PROJECT}.UnitTests/${DOTNET_PROJECT}.UnitTests.csproj" -c Release  --no-restore

      - name: Integration Tests
        shell: bash
        run: |
          dotnet test "./Tests/Integration/${DOTNET_PROJECT}.IntegrationTests/${DOTNET_PROJECT}.IntegrationTests.csproj" -c Release  --no-restore

  deploy_production:
    name: Deploy to Homolog
    needs: [project_build, validate_environment]
    runs-on: ubuntu-latest
    env:
      DOTNET_PROJECT: ${{ needs.validate_environment.outputs.dotnet_project }}
      IMAGE_NAME: ${{ needs.validate_environment.outputs.image_name }}
      DOCKERFILE_PATH: ${{ needs.validate_environment.outputs.dockerfile_path }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Login to OCIR
        shell: bash
        run: |
          REGION="${{ secrets.OCI_REGION }}"
          NS="${{ secrets.OCI_TENANCY_NAMESPACE }}"
          USER="${{ secrets.OCI_USERNAME }}"
          TOKEN="${{ secrets.OCI_AUTH_TOKEN }}"
          echo "$TOKEN" | docker login "$REGION.ocir.io" \
            --username "$USER" \
            --password-stdin

      - name: Build Docker Image
        shell: bash
        run: |
          REGION="${{ secrets.OCI_REGION }}"
          NS="${{ secrets.OCI_TENANCY_NAMESPACE }}"
          SHORT_SHA="${GITHUB_SHA:0:7}"

          IMAGE_FULL="${{ env.IMAGE_NAME }}:dev"
          docker build -t "$IMAGE_FULL" -f "${{ env.DOCKERFILE_PATH }}" .

      - name: Push Docker Image to Oracle
        shell: bash
        run: |
          REGION="${{ secrets.OCI_REGION }}"
          NS="${{ secrets.OCI_TENANCY_NAMESPACE }}"

          IMAGE_BASE="$REGION.ocir.io/$NS/${{ env.IMAGE_NAME }}"
          docker push "$IMAGE_BASE:dev"

  repository_tag:
    name: Create homolog tag
    runs-on: ubuntu-latest
    needs: [deploy_production, validate_environment]
    permissions:
      contents: write
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create and push tag
        run: |
          TAG_NAME="${{ needs.validate_environment.outputs.service_name }}@homolog"
          git tag "$TAG_NAME"
          git push origin "$TAG_NAME"
